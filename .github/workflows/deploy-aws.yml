# =====================================================================
#  MANUAL deploy · AWS (ECR + App Runner + RDS MySQL)
#  Local `./run.sh` / `docker compose up` stay the primary dev paths — this is opt-in
#  (workflow_dispatch).
#
#  ONE-TIME SETUP: run `deploy/aws-setup.sh` (creates the ECR repos, the RDS MySQL instance +
#  database, the App Runner ECR-access role, and a deployer IAM user). Then add the GitHub secrets it
#  prints and set the RDS_ENDPOINT repo variable:
#    Secrets:   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ACCOUNT_ID, DB_USER, DB_PASS
#    Variable:  RDS_ENDPOINT  (the RDS instance endpoint host)
#  Finally edit the `env:` block below.
#
#  SINGLE-PASS: creates-or-updates the backend service, polls until RUNNING, reads its URL, builds
#  the frontend against it, deploys it, then re-deploys the backend with the frontend's origin in the
#  CORS allowlist. This is the most CLI-heavy of the three clouds (App Runner has no `wait` verb, so
#  we poll, and env vars are replaced wholesale on each update). See docs/DEPLOYMENT.md.
# =====================================================================
name: Deploy · AWS (App Runner)

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1                  # <-- EDIT
  # RDS rejects hyphens in the initial DB name, so AWS uses a hyphen-free schema (the app reads the
  # schema from the JDBC URL — the name is arbitrary). aws-setup.sh creates this same name.
  DB_NAME: fullstackecommerce

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        run: |
          REG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          docker build -t "$REG/luv2shop-backend:${{ github.sha }}" -t "$REG/luv2shop-backend:latest" ./backend
          docker push "$REG/luv2shop-backend:${{ github.sha }}"
          docker push "$REG/luv2shop-backend:latest"

      - name: Deploy backend (prod profile + RDS)
        id: be
        run: |
          REG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ROLE="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/AppRunnerECRAccessRole"
          DB_URL="jdbc:mysql://${{ vars.RDS_ENDPOINT }}:3306/${{ env.DB_NAME }}"
          cat > src.json <<JSON
          {
            "ImageRepository": {
              "ImageIdentifier": "$REG/luv2shop-backend:latest",
              "ImageRepositoryType": "ECR",
              "ImageConfiguration": {
                "Port": "8585",
                "RuntimeEnvironmentVariables": {
                  "SPRING_PROFILES_ACTIVE": "prod",
                  "SPRING_DOCKER_COMPOSE_ENABLED": "false",
                  "SPRING_DATASOURCE_URL": "$DB_URL",
                  "SPRING_DATASOURCE_USERNAME": "${{ secrets.DB_USER }}",
                  "SPRING_DATASOURCE_PASSWORD": "${{ secrets.DB_PASS }}"
                }
              }
            },
            "AutoDeploymentsEnabled": false,
            "AuthenticationConfiguration": { "AccessRoleArn": "$ROLE" }
          }
          JSON
          BE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='luv2shop-backend'].ServiceArn | [0]" --output text)
          if [ "$BE_ARN" = "None" ] || [ -z "$BE_ARN" ]; then
            BE_ARN=$(aws apprunner create-service --service-name luv2shop-backend \
              --source-configuration file://src.json \
              --instance-configuration '{"Cpu":"1024","Memory":"2048"}' \
              --health-check-configuration '{"Protocol":"HTTP","Path":"/actuator/health/readiness","Interval":10,"Timeout":5,"HealthyThreshold":1,"UnhealthyThreshold":5}' \
              --query 'Service.ServiceArn' --output text)
          else
            aws apprunner update-service --service-arn "$BE_ARN" --source-configuration file://src.json
          fi
          echo "arn=$BE_ARN" >> "$GITHUB_OUTPUT"

      - name: Wait for backend + capture URL
        id: beurl
        run: |
          ARN="${{ steps.be.outputs.arn }}"
          for i in $(seq 1 80); do
            S=$(aws apprunner describe-service --service-arn "$ARN" --query 'Service.Status' --output text)
            echo "backend status: $S"; [ "$S" = "RUNNING" ] && break
            case "$S" in *FAILED*) echo "backend deploy failed"; exit 1;; esac
            sleep 15
          done
          HOST=$(aws apprunner describe-service --service-arn "$ARN" --query 'Service.ServiceUrl' --output text)
          echo "url=https://$HOST" >> "$GITHUB_OUTPUT"
          echo "Backend at https://$HOST"

      - name: Build & push frontend image (API baked to the live backend)
        run: |
          REG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          docker build --build-arg API_URL="${{ steps.beurl.outputs.url }}/api" \
            -t "$REG/luv2shop-frontend:${{ github.sha }}" -t "$REG/luv2shop-frontend:latest" ./frontend/angular-ecommerce
          docker push "$REG/luv2shop-frontend:${{ github.sha }}"
          docker push "$REG/luv2shop-frontend:latest"

      - name: Deploy frontend + capture URL
        id: feurl
        run: |
          REG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ROLE="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/AppRunnerECRAccessRole"
          cat > fe.json <<JSON
          {
            "ImageRepository": {
              "ImageIdentifier": "$REG/luv2shop-frontend:latest",
              "ImageRepositoryType": "ECR",
              "ImageConfiguration": { "Port": "80" }
            },
            "AutoDeploymentsEnabled": false,
            "AuthenticationConfiguration": { "AccessRoleArn": "$ROLE" }
          }
          JSON
          FE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='luv2shop-frontend'].ServiceArn | [0]" --output text)
          if [ "$FE_ARN" = "None" ] || [ -z "$FE_ARN" ]; then
            FE_ARN=$(aws apprunner create-service --service-name luv2shop-frontend \
              --source-configuration file://fe.json \
              --instance-configuration '{"Cpu":"512","Memory":"1024"}' \
              --query 'Service.ServiceArn' --output text)
          else
            aws apprunner update-service --service-arn "$FE_ARN" --source-configuration file://fe.json
          fi
          for i in $(seq 1 80); do
            S=$(aws apprunner describe-service --service-arn "$FE_ARN" --query 'Service.Status' --output text)
            echo "frontend status: $S"; [ "$S" = "RUNNING" ] && break
            case "$S" in *FAILED*) echo "frontend deploy failed"; exit 1;; esac
            sleep 15
          done
          HOST=$(aws apprunner describe-service --service-arn "$FE_ARN" --query 'Service.ServiceUrl' --output text)
          echo "url=https://$HOST" >> "$GITHUB_OUTPUT"
          echo "Frontend at https://$HOST"

      # App Runner replaces RuntimeEnvironmentVariables wholesale, so re-send the full backend env
      # plus the now-known frontend origin for CORS + email links.
      - name: Re-deploy backend with CORS pointed at the live frontend
        run: |
          REG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ROLE="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/AppRunnerECRAccessRole"
          DB_URL="jdbc:mysql://${{ vars.RDS_ENDPOINT }}:3306/${{ env.DB_NAME }}"
          cat > src2.json <<JSON
          {
            "ImageRepository": {
              "ImageIdentifier": "$REG/luv2shop-backend:latest",
              "ImageRepositoryType": "ECR",
              "ImageConfiguration": {
                "Port": "8585",
                "RuntimeEnvironmentVariables": {
                  "SPRING_PROFILES_ACTIVE": "prod",
                  "SPRING_DOCKER_COMPOSE_ENABLED": "false",
                  "SPRING_DATASOURCE_URL": "$DB_URL",
                  "SPRING_DATASOURCE_USERNAME": "${{ secrets.DB_USER }}",
                  "SPRING_DATASOURCE_PASSWORD": "${{ secrets.DB_PASS }}",
                  "APP_CORS_ALLOWED_ORIGINS": "${{ steps.feurl.outputs.url }}",
                  "APP_FRONTEND_URL": "${{ steps.feurl.outputs.url }}",
                  "APP_API_URL": "${{ steps.beurl.outputs.url }}"
                }
              }
            },
            "AutoDeploymentsEnabled": false,
            "AuthenticationConfiguration": { "AccessRoleArn": "$ROLE" }
          }
          JSON
          aws apprunner update-service --service-arn "${{ steps.be.outputs.arn }}" --source-configuration file://src2.json

      - name: Summary
        run: |
          {
            echo "### Deployed to AWS App Runner 🚀"
            echo "- **Frontend:** ${{ steps.feurl.outputs.url }}"
            echo "- **Backend:**  ${{ steps.beurl.outputs.url }}"
            echo ""
            echo "_The empty RDS database is migrated by Flyway on the backend's first boot and seeded by the DataLoader._"
          } >> "$GITHUB_STEP_SUMMARY"
