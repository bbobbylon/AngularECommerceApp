# =====================================================================
#  MANUAL deploy · AWS (ECR + App Runner + RDS MySQL)
#  Local `./run.sh` / `docker compose up` stay the primary dev paths — this is opt-in
#  (workflow_dispatch).
#
#  PLUG & PLAY: all config is read from `deploy/aws.env` (the one file you edit) — nothing to change
#  in this YAML, and no repo variables to manage (the workflow discovers your AWS account id and the
#  live RDS endpoint at runtime). ONE-TIME SETUP: edit AWS_REGION in deploy/aws.env, then run
#  `bash deploy/aws-setup.sh` (provisions ECR / RDS / IAM and, if `gh` is authenticated, pushes the
#  three secrets below).
#    Secrets needed:  AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, DB_PASS
#
#  SINGLE-PASS: creates-or-updates the backend service, polls until RUNNING, reads its URL, builds
#  the frontend against it, deploys it, then re-deploys the backend with the frontend's origin in the
#  CORS allowlist. This is the most CLI-heavy of the three clouds (App Runner has no `wait` verb, so
#  we poll, and env vars are replaced wholesale on each update). See docs/DEPLOYMENT.md.
# =====================================================================
name: Deploy · AWS (App Runner)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Single source of truth: load deploy/aws.env into the job environment.
      - name: Load deploy config (deploy/aws.env)
        run: |
          grep -E '^[A-Z_]+=' deploy/aws.env | sed 's/\r$//' >> "$GITHUB_ENV"
          echo "Loaded deploy/aws.env"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Discover the account id (from the creds) and the live RDS endpoint (from DB_INSTANCE),
      # so neither has to be a secret or a repo variable.
      - name: Discover AWS account + RDS endpoint
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"
          EP=$(aws rds describe-db-instances --db-instance-identifier "$DB_INSTANCE" \
            --query 'DBInstances[0].Endpoint.Address' --output text --region "$AWS_REGION")
          echo "RDS_ENDPOINT=$EP" >> "$GITHUB_ENV"
          echo "RDS endpoint: $EP"

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        run: |
          REG="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          docker build -t "$REG/$BACKEND_SERVICE:${{ github.sha }}" -t "$REG/$BACKEND_SERVICE:latest" ./backend
          docker push "$REG/$BACKEND_SERVICE:${{ github.sha }}"
          docker push "$REG/$BACKEND_SERVICE:latest"

      - name: Deploy backend (prod profile + RDS)
        id: be
        run: |
          REG="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          ROLE="arn:aws:iam::$ACCOUNT_ID:role/AppRunnerECRAccessRole"
          DB_URL="jdbc:mysql://$RDS_ENDPOINT:3306/$DB_NAME"
          INSTANCE_CFG="{\"Cpu\":\"$BACKEND_CPU\",\"Memory\":\"$BACKEND_MEMORY\"}"
          cat > src.json <<JSON
          {
            "ImageRepository": {
              "ImageIdentifier": "$REG/$BACKEND_SERVICE:latest",
              "ImageRepositoryType": "ECR",
              "ImageConfiguration": {
                "Port": "8585",
                "RuntimeEnvironmentVariables": {
                  "SPRING_PROFILES_ACTIVE": "prod",
                  "SPRING_DOCKER_COMPOSE_ENABLED": "false",
                  "SPRING_DATASOURCE_URL": "$DB_URL",
                  "SPRING_DATASOURCE_USERNAME": "$DB_USER",
                  "SPRING_DATASOURCE_PASSWORD": "${{ secrets.DB_PASS }}"
                }
              }
            },
            "AutoDeploymentsEnabled": false,
            "AuthenticationConfiguration": { "AccessRoleArn": "$ROLE" }
          }
          JSON
          BE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='$BACKEND_SERVICE'].ServiceArn | [0]" --output text)
          if [ "$BE_ARN" = "None" ] || [ -z "$BE_ARN" ]; then
            BE_ARN=$(aws apprunner create-service --service-name "$BACKEND_SERVICE" \
              --source-configuration file://src.json \
              --instance-configuration "$INSTANCE_CFG" \
              --health-check-configuration '{"Protocol":"HTTP","Path":"/actuator/health/readiness","Interval":10,"Timeout":5,"HealthyThreshold":1,"UnhealthyThreshold":5}' \
              --query 'Service.ServiceArn' --output text)
          else
            aws apprunner update-service --service-arn "$BE_ARN" --source-configuration file://src.json
          fi
          echo "arn=$BE_ARN" >> "$GITHUB_OUTPUT"

      - name: Wait for backend + capture URL
        id: beurl
        run: |
          ARN="${{ steps.be.outputs.arn }}"
          for i in $(seq 1 80); do
            S=$(aws apprunner describe-service --service-arn "$ARN" --query 'Service.Status' --output text)
            echo "backend status: $S"; [ "$S" = "RUNNING" ] && break
            case "$S" in *FAILED*) echo "backend deploy failed"; exit 1;; esac
            sleep 15
          done
          HOST=$(aws apprunner describe-service --service-arn "$ARN" --query 'Service.ServiceUrl' --output text)
          echo "url=https://$HOST" >> "$GITHUB_OUTPUT"
          echo "Backend at https://$HOST"

      - name: Build & push frontend image (API baked to the live backend)
        run: |
          REG="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          docker build --build-arg API_URL="${{ steps.beurl.outputs.url }}/api" \
            -t "$REG/$FRONTEND_SERVICE:${{ github.sha }}" -t "$REG/$FRONTEND_SERVICE:latest" ./frontend/angular-ecommerce
          docker push "$REG/$FRONTEND_SERVICE:${{ github.sha }}"
          docker push "$REG/$FRONTEND_SERVICE:latest"

      - name: Deploy frontend + capture URL
        id: feurl
        run: |
          REG="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          ROLE="arn:aws:iam::$ACCOUNT_ID:role/AppRunnerECRAccessRole"
          INSTANCE_CFG="{\"Cpu\":\"$FRONTEND_CPU\",\"Memory\":\"$FRONTEND_MEMORY\"}"
          cat > fe.json <<JSON
          {
            "ImageRepository": {
              "ImageIdentifier": "$REG/$FRONTEND_SERVICE:latest",
              "ImageRepositoryType": "ECR",
              "ImageConfiguration": { "Port": "80" }
            },
            "AutoDeploymentsEnabled": false,
            "AuthenticationConfiguration": { "AccessRoleArn": "$ROLE" }
          }
          JSON
          FE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='$FRONTEND_SERVICE'].ServiceArn | [0]" --output text)
          if [ "$FE_ARN" = "None" ] || [ -z "$FE_ARN" ]; then
            FE_ARN=$(aws apprunner create-service --service-name "$FRONTEND_SERVICE" \
              --source-configuration file://fe.json \
              --instance-configuration "$INSTANCE_CFG" \
              --query 'Service.ServiceArn' --output text)
          else
            aws apprunner update-service --service-arn "$FE_ARN" --source-configuration file://fe.json
          fi
          for i in $(seq 1 80); do
            S=$(aws apprunner describe-service --service-arn "$FE_ARN" --query 'Service.Status' --output text)
            echo "frontend status: $S"; [ "$S" = "RUNNING" ] && break
            case "$S" in *FAILED*) echo "frontend deploy failed"; exit 1;; esac
            sleep 15
          done
          HOST=$(aws apprunner describe-service --service-arn "$FE_ARN" --query 'Service.ServiceUrl' --output text)
          echo "url=https://$HOST" >> "$GITHUB_OUTPUT"
          echo "Frontend at https://$HOST"

      # App Runner replaces RuntimeEnvironmentVariables wholesale, so re-send the full backend env
      # plus the now-known frontend origin for CORS + email links.
      - name: Re-deploy backend with CORS pointed at the live frontend
        run: |
          REG="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          ROLE="arn:aws:iam::$ACCOUNT_ID:role/AppRunnerECRAccessRole"
          DB_URL="jdbc:mysql://$RDS_ENDPOINT:3306/$DB_NAME"
          cat > src2.json <<JSON
          {
            "ImageRepository": {
              "ImageIdentifier": "$REG/$BACKEND_SERVICE:latest",
              "ImageRepositoryType": "ECR",
              "ImageConfiguration": {
                "Port": "8585",
                "RuntimeEnvironmentVariables": {
                  "SPRING_PROFILES_ACTIVE": "prod",
                  "SPRING_DOCKER_COMPOSE_ENABLED": "false",
                  "SPRING_DATASOURCE_URL": "$DB_URL",
                  "SPRING_DATASOURCE_USERNAME": "$DB_USER",
                  "SPRING_DATASOURCE_PASSWORD": "${{ secrets.DB_PASS }}",
                  "APP_CORS_ALLOWED_ORIGINS": "${{ steps.feurl.outputs.url }}",
                  "APP_FRONTEND_URL": "${{ steps.feurl.outputs.url }}",
                  "APP_API_URL": "${{ steps.beurl.outputs.url }}"
                }
              }
            },
            "AutoDeploymentsEnabled": false,
            "AuthenticationConfiguration": { "AccessRoleArn": "$ROLE" }
          }
          JSON
          aws apprunner update-service --service-arn "${{ steps.be.outputs.arn }}" --source-configuration file://src2.json

      - name: Summary
        run: |
          {
            echo "### Deployed to AWS App Runner 🚀"
            echo "- **Frontend:** ${{ steps.feurl.outputs.url }}"
            echo "- **Backend:**  ${{ steps.beurl.outputs.url }}"
            echo ""
            echo "_The empty RDS database is migrated by Flyway on the backend's first boot and seeded by the DataLoader._"
          } >> "$GITHUB_STEP_SUMMARY"
