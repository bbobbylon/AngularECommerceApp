# Test profile: in-memory H2 (production stays MySQL-only). Lets the full test suite
# run without Docker/MySQL. H2 runs in MySQL-compatibility mode for closer parity.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Tests build the schema with Hibernate on H2; Flyway migrations are MySQL-specific, so skip them here.
spring.flyway.enabled=false

# Don't try to start the docker-compose MySQL service during tests.
spring.docker.compose.enabled=false

spring.data.rest.base-path=/api

# Stripe key resolves to empty in tests (no network calls at startup).
stripe.key.secret=
