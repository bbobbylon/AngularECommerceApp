# Production profile — activate with SPRING_PROFILES_ACTIVE=prod.
# Quieter, locked-down overrides on top of application.properties for a deployed environment.
# (Datasource/secrets still come from env vars; this file only changes behaviour, not credentials.)

# Don't log every SQL statement in production (noisy + slows hot paths).
spring.jpa.show-sql=false

# Lock the interactive API docs in production — the Swagger UI / OpenAPI spec are dev conveniences.
# Re-enable per environment if you want them behind the gateway/JWT instead.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Structured (ECS JSON) console logs for aggregation (ELK/Datadog/Loki).
logging.structured.format.console=ecs

# Don't reveal health component details to anonymous callers; the admin System Health view is the
# friendly, authenticated surface for operators.
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
