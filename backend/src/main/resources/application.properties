spring.application.name=ecommerceAngularApp

# Server runs on a non-default port to avoid clashing with anything on 8080.
server.port=8585

# Datasource (matches compose.yaml MySQL service; 3307 avoids a conflict with any
# existing MySQL on the default 3306).
spring.datasource.url=jdbc:mysql://localhost:3307/full-stack-ecommerce
spring.datasource.username=ecommerceapp
spring.datasource.password=ecommerceapp

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring Data REST
spring.data.rest.base-path=/api

# Security (Milestone 3 - Okta OIDC)
# Set your Okta authorization server issuer to turn on JWT validation.
# While this is unset the API stays open, so catalog/cart/checkout work without an IdP.
# Once set, GET /api/orders/** requires a valid Bearer token.
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://YOUR_OKTA_DOMAIN/oauth2/default

# Stripe (Milestone 5)
# Your Stripe TEST secret key enables the /api/checkout/payment-intent endpoint.
# Empty by default so the app starts without Stripe; set it via the STRIPE_SECRET_KEY
# environment variable (preferred) or inline here. Use a test key: sk_test_...
stripe.key.secret=${STRIPE_SECRET_KEY:}

# Email (Milestone 6) - transactional + weekly marketing email via Gmail SMTP.
# Disabled by default so the app boots without credentials; EmailService no-ops until a
# username + password are present. To enable real delivery (see docs/EMAIL.md):
#   1) Turn on 2-Step Verification on your Google account.
#   2) Create an App Password at https://myaccount.google.com/apppasswords
#   3) Set the env vars GMAIL_USERNAME (your address) and GMAIL_APP_PASSWORD (16-char password).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# "From" shown to recipients; defaults to the authenticated Gmail address when unset.
app.mail.from=${MAIL_FROM:${spring.mail.username}}
app.mail.from-name=${MAIL_FROM_NAME:Luv2Shop}
# Public base URL used to build links (unsubscribe, view-in-browser) inside emails.
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4250}
app.api-url=${APP_API_URL:http://localhost:8585}
# Weekly marketing blast schedule (Spring cron). Default: Mondays at 09:00 server time.
app.newsletter.cron=${NEWSLETTER_CRON:0 0 9 * * MON}
# Guards POST /api/newsletter/send-now (manual trigger). Empty = endpoint disabled.
app.newsletter.admin-token=${NEWSLETTER_ADMIN_TOKEN:}

# HTTPS (Milestone 4) - disabled by default (plain HTTP on 8080).
# 1) Generate a self-signed PKCS12 keystore into src/main/resources:
#      keytool -genkeypair -alias ecommerce -keyalg RSA -keysize 2048 -storetype PKCS12 \
#        -keystore luv2shop-ssl.p12 -validity 365 -storepass secret -dname "CN=localhost"
# 2) Uncomment the block below, then the API serves on https://localhost:8443
#    (also serve the Angular app over TLS: `ng serve --ssl` and point environment.apiUrl
#     at https://localhost:8443/api).
# server.port=8443
# server.ssl.enabled=true
# server.ssl.key-store=classpath:luv2shop-ssl.p12
# server.ssl.key-store-type=PKCS12
# server.ssl.key-store-password=secret
# server.ssl.key-alias=ecommerce
