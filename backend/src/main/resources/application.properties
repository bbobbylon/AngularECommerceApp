spring.application.name=ecommerceAngularApp

# Datasource (matches compose.yaml MySQL service)
spring.datasource.url=jdbc:mysql://localhost:3306/full-stack-ecommerce
spring.datasource.username=ecommerceapp
spring.datasource.password=ecommerceapp

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring Data REST
spring.data.rest.base-path=/api

# Security (Milestone 3 - Okta OIDC)
# Set your Okta authorization server issuer to turn on JWT validation.
# While this is unset the API stays open, so catalog/cart/checkout work without an IdP.
# Once set, GET /api/orders/** requires a valid Bearer token.
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://YOUR_OKTA_DOMAIN/oauth2/default

# Stripe (Milestone 5)
# Your Stripe TEST secret key enables the /api/checkout/payment-intent endpoint.
# Empty by default so the app starts without Stripe; set it via the STRIPE_SECRET_KEY
# environment variable (preferred) or inline here. Use a test key: sk_test_...
stripe.key.secret=${STRIPE_SECRET_KEY:}

# HTTPS (Milestone 4) - disabled by default (plain HTTP on 8080).
# 1) Generate a self-signed PKCS12 keystore into src/main/resources:
#      keytool -genkeypair -alias ecommerce -keyalg RSA -keysize 2048 -storetype PKCS12 \
#        -keystore luv2shop-ssl.p12 -validity 365 -storepass secret -dname "CN=localhost"
# 2) Uncomment the block below, then the API serves on https://localhost:8443
#    (also serve the Angular app over TLS: `ng serve --ssl` and point environment.apiUrl
#     at https://localhost:8443/api).
# server.port=8443
# server.ssl.enabled=true
# server.ssl.key-store=classpath:luv2shop-ssl.p12
# server.ssl.key-store-type=PKCS12
# server.ssl.key-store-password=secret
# server.ssl.key-alias=ecommerce
