spring.application.name=ecommerceAngularApp

# Server runs on a non-default port to avoid clashing with anything on 8080.
server.port=8585

# Datasource (matches compose.yaml MySQL service; 3307 avoids a conflict with any
# existing MySQL on the default 3306).
spring.datasource.url=jdbc:mysql://localhost:3307/full-stack-ecommerce
spring.datasource.username=ecommerceapp
spring.datasource.password=ecommerceapp

# JPA / Hibernate
# Flyway owns the schema now (see below); Hibernate only VALIDATES it against the entities on boot.
# This retires the old ddl-auto=update gotcha (it would silently skip adding a NOT NULL column to a
# populated table, then crash queries). A mismatch now fails fast and loudly at startup instead.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# ---------- Database migrations (Flyway) ----------
# Schema changes go in src/main/resources/db/migration/V{n}__name.sql (V1 = baseline). Never edit an
# applied migration — add a new versioned one. See docs/MAINTENANCE.md.
spring.flyway.enabled=true
# Existing databases (built by the old ddl-auto=update) are non-empty with no Flyway history — stamp
# them at the V1 baseline instead of trying to re-create their tables. Fresh databases run V1 cleanly.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ---------- Production hardening (safe defaults; see application-prod.properties for the prod profile) ----------
# Graceful shutdown: stop taking new requests, let in-flight ones finish (up to the timeout) so a
# rolling deploy / pod eviction doesn't sever active connections.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
# gzip JSON/text responses over ~1 KB (catalog/search pages compress well).
server.compression.enabled=true
server.compression.mime-types=application/json,application/hal+json,text/html,text/css,application/javascript
server.compression.min-response-size=1024
# Connection pool (HikariCP) — modest defaults for a small service; raise the pool size under load.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=luv2shop-pool
# Limit how much of an oversized request body Tomcat will read; never leak stack traces in errors
# (the GlobalExceptionHandler shapes the actual error body).
server.tomcat.max-swallow-size=2MB
server.error.include-stacktrace=never

# Spring Data REST
spring.data.rest.base-path=/api

# ---------- Observability / ops (Spring Boot Actuator) ----------
# Exposed endpoints: health (+ liveness/readiness probes), info, metrics, Prometheus scrape.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Health details only for authenticated callers (safe default); the admin System Health view
# at /api/admin/system surfaces a friendly summary instead.
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
# Liveness/readiness probes (kubelet/load-balancer ready): /actuator/health/liveness|readiness
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Mail is an OPTIONAL, gracefully-degraded integration — don't let an unconfigured/unreachable SMTP
# server drag /actuator/health to DOWN (which would make k8s/LBs evict a perfectly healthy pod).
# Its real status is surfaced via the admin System Health view instead.
management.health.mail.enabled=false
info.app.name=${spring.application.name}
info.app.description=Luv2Shop e-commerce API
# Correlation id (set by RequestIdFilter) is shown right after the log level on every line.
logging.pattern.level=%5p [%X{requestId:-}]

# Security (Milestone 3 - Okta OIDC)
# Set your Okta authorization server issuer to turn on JWT validation.
# While this is unset the API stays open, so catalog/cart/checkout work without an IdP.
# Once set, GET /api/orders/** requires a valid Bearer token.
# spring.security.oauth2.resourceserver.jwt.issuer-uri=https://YOUR_OKTA_DOMAIN/oauth2/default

# Role-based admin access (security hardening). When Okta is configured, /api/admin/** requires the
# admin role below rather than just any authenticated user. The role is read from a JWT array claim
# (Okta's default is "groups"). Defaults assume a "groups" claim that contains an "Admin" group;
# override either if your IdP names them differently. No effect while the open chain is active.
# app.security.admin-claim=groups
# app.security.admin-role=Admin

# ---------- API documentation (springdoc / OpenAPI) ----------
# Interactive Swagger UI at /swagger-ui.html; OpenAPI 3.1 spec at /v3/api-docs (JSON) and
# /v3/api-docs.yaml. Generated from the controllers, plus the metadata/auth scheme in OpenApiConfig.
# Enabled by default (handy for the demo/portfolio). In a locked-down production deployment, disable
# both — or put them behind the JWT chain at the gateway:
#   springdoc.api-docs.enabled=false
#   springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Stripe (Milestone 5)
# Your Stripe TEST secret key enables the /api/checkout/payment-intent endpoint.
# Empty by default so the app starts without Stripe; set it via the STRIPE_SECRET_KEY
# environment variable (preferred) or inline here. Use a test key: sk_test_...
stripe.key.secret=${STRIPE_SECRET_KEY:}

# Email (Milestone 6) - transactional + weekly marketing email via Gmail SMTP.
# Disabled by default so the app boots without credentials; EmailService no-ops until a
# username + password are present. To enable real delivery (see docs/EMAIL.md):
#   1) Turn on 2-Step Verification on your Google account.
#   2) Create an App Password at https://myaccount.google.com/apppasswords
#   3) Set the env vars GMAIL_USERNAME (your address) and GMAIL_APP_PASSWORD (16-char password).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# "From" shown to recipients; defaults to the authenticated Gmail address when unset.
app.mail.from=${MAIL_FROM:${spring.mail.username}}
app.mail.from-name=${MAIL_FROM_NAME:Luv2Shop}
# Public base URL used to build links (unsubscribe, view-in-browser) inside emails.
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4250}
app.api-url=${APP_API_URL:http://localhost:8585}
# Weekly marketing blast schedule (Spring cron). Default: Mondays at 09:00 server time.
app.newsletter.cron=${NEWSLETTER_CRON:0 0 9 * * MON}
# Guards POST /api/newsletter/send-now (manual trigger). Empty = endpoint disabled.
app.newsletter.admin-token=${NEWSLETTER_ADMIN_TOKEN:}

# HTTPS (Milestone 4) - disabled by default (plain HTTP on 8080).
# 1) Generate a self-signed PKCS12 keystore into src/main/resources:
#      keytool -genkeypair -alias ecommerce -keyalg RSA -keysize 2048 -storetype PKCS12 \
#        -keystore luv2shop-ssl.p12 -validity 365 -storepass secret -dname "CN=localhost"
# 2) Uncomment the block below, then the API serves on https://localhost:8443
#    (also serve the Angular app over TLS: `ng serve --ssl` and point environment.apiUrl
#     at https://localhost:8443/api).
# server.port=8443
# server.ssl.enabled=true
# server.ssl.key-store=classpath:luv2shop-ssl.p12
# server.ssl.key-store-type=PKCS12
# server.ssl.key-store-password=secret
# server.ssl.key-alias=ecommerce
