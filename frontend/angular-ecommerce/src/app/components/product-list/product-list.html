<div class="container my-4">

  @if (products.length > 0) {
    <div class="d-flex justify-content-end align-items-center mb-3">
      <label class="me-2 mb-0">Page size:</label>
      <select class="form-select w-auto" (change)="updatePageSize($any($event.target).value)">
        <option [selected]="pageSize === 5">5</option>
        <option [selected]="pageSize === 10">10</option>
        <option [selected]="pageSize === 20">20</option>
      </select>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
      @for (product of products; track product.id) {
        <div class="col">
          <div class="card h-100">
            <a [routerLink]="['/products', product.id]">
              <img [src]="product.imageUrl" [alt]="product.name" class="card-img-top" />
            </a>
            <div class="card-body d-flex flex-column">
              <a [routerLink]="['/products', product.id]" class="text-decoration-none">
                <h6 class="card-title">{{ product.name }}</h6>
              </a>
              <p class="fw-bold mt-auto">{{ product.unitPrice | currency: 'USD' }}</p>
            </div>
          </div>
        </div>
      }
    </div>

    <div class="d-flex justify-content-center mt-4">
      <ngb-pagination
        [collectionSize]="totalElements"
        [(page)]="pageNumber"
        [pageSize]="pageSize"
        [maxSize]="5"
        [boundaryLinks]="true"
        (pageChange)="listProducts()">
      </ngb-pagination>
    </div>
  } @else {
    <div class="alert alert-info text-center" role="alert">
      No products found.
    </div>
  }

</div>
