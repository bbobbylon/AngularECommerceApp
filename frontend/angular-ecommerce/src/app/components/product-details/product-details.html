@if (product) {
  <nav class="mb-3">
    <a routerLink="/products" class="text-decoration-none">
      <i class="fa-solid fa-arrow-left me-1"></i> Back to products
    </a>
  </nav>

  <div class="row g-4">
    <div class="col-md-5">
      <img [src]="product.imageUrl" [alt]="product.name"
           class="img-fluid rounded shadow-sm" />
    </div>
    <div class="col-md-7">
      <h2>{{ product.name }}</h2>
      <p class="text-muted">SKU: {{ product.sku }}</p>
      <p class="fs-3 fw-bold">{{ product.unitPrice | currency:'USD' }}</p>
      <p>{{ product.description }}</p>

      @if (product.unitsInStock > 0) {
        <span class="badge bg-success">In stock ({{ product.unitsInStock }})</span>
      } @else {
        <span class="badge bg-danger">Out of stock</span>
      }

      <div class="mt-4">
        <button type="button" class="btn btn-primary" [disabled]="product.unitsInStock === 0"
                (click)="addToCart()">
          <i class="fa-solid fa-cart-shopping me-1"></i> Add to cart
        </button>
      </div>
    </div>
  </div>
} @else {
  <div class="text-center text-muted py-5">Loading product...</div>
}
