<div class="card category-menu shadow-sm">
  <div class="card-header bg-white fw-bold text-uppercase small text-secondary">
    <i class="fa-solid fa-layer-group me-2"></i>Categories
  </div>
  <div class="list-group list-group-flush">
    <a routerLink="/products"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: true }"
       class="list-group-item list-group-item-action d-flex align-items-center">
      <i class="fa-solid fa-border-all me-2 text-secondary"></i> All products
    </a>
    @for (category of productCategories; track category.id) {
      <a [routerLink]="['/category', category.id]"
         routerLinkActive="active"
         class="list-group-item list-group-item-action d-flex align-items-center">
        <i class="fa-solid {{ iconFor(category.categoryName) }} me-2 text-secondary"></i>
        {{ category.categoryName }}
      </a>
    }
  </div>
</div>
