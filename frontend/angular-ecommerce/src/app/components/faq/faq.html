<div class="mb-4">
  <h1 class="fw-bold mb-1"><i class="fa-solid fa-circle-question me-2 text-primary"></i>Frequently asked questions</h1>
  <p class="text-muted mb-0">Everything you need to know about shopping with Luv2Shop.</p>
</div>

<div class="row">
  <div class="col-lg-9">
    @for (item of faqs; track item.q) {
      <details class="faq-item">
        <summary>{{ item.q }}</summary>
        <p class="text-muted mb-0">{{ item.a }}</p>
      </details>
    }

    <div class="card mt-4">
      <div class="card-body d-flex flex-wrap justify-content-between align-items-center gap-2">
        <span class="fw-semibold">Still have a question?</span>
        <a routerLink="/contact" class="btn btn-primary"><i class="fa-solid fa-envelope me-1"></i> Contact us</a>
      </div>
    </div>
  </div>
</div>
