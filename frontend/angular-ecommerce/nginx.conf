server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for the JS/CSS bundles
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- Security headers (sent on the HTML document; `always` covers error responses too) ----
    # Content-Security-Policy tuned for this SPA:
    #   - script-src: own bundles ('self') + Stripe.js. Angular AOT builds need no 'unsafe-inline'/'eval'.
    #   - style-src: 'unsafe-inline' for Angular's injected component styles + the Google Fonts stylesheet.
    #   - font-src: Google Fonts (DM Sans / Fraunces) files from fonts.gstatic.com (+ data: for inlined).
    #   - img-src: product images come from arbitrary https hosts (+ data: for inlined SVGs).
    #   - connect-src: XHR to the backend API + Okta + Stripe. 'self' https: covers cloud (https backend,
    #     Okta, Stripe); http://localhost:8585 covers the local `docker compose` backend (served over http).
    #   - frame-src: Stripe Elements (card input) iframes.
    # Tighten connect-src/frame-src to your exact backend + Okta origins (and drop the localhost entry)
    # for a stricter production policy.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' http://localhost:8585 https:; frame-src https://js.stripe.com https://hooks.stripe.com https://*.okta.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Takes effect once served over HTTPS (TLS terminated at the proxy/LB in front of this container).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA fallback — every route serves index.html, Angular handles routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache the fingerprinted assets aggressively (nginx drops inherited add_header in a location with
    # its own add_header, so re-assert nosniff here; CSP isn't needed on static JS/CSS/image files).
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }
}
